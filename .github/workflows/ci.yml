name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Compile, test, and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Test
        run: npm run test

      - name: Typecheck
        run: npm run typecheck
